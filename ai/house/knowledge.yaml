# Znalosti domu pro EMS AI
#
# Tohle není runtime konfigurace řízení. Je to kontext pro AI poradce,
# aby uměl lidsky poradit, co je vhodné pustit a kde jsou fázové konflikty.
# Akce z této vrstvy se nikdy nesmí provádět bez potvrzení uživatele.

house:
  style:
    audience: "rodina"
    voice: "jako David vysvětluje doma, co se teď dá pustit"
    default_no_action: "Není potřeba nic řešit."

  phases:
    L1:
      note: "Myčka a jedna polovina varné desky."
    L2:
      note: "Pergolový bojler a druhá polovina varné desky."
    L3:
      note: "Spodní bojler, trouba a pračka."

  appliances:
    bottom_boiler:
      label: "spodní bojler"
      phase: "L3"
      type: "controlled_load"
      can_be_paused: true
      pause_script: "script.ems_pause_bottom_boiler_for_oven"
      note: "Sdílí L3 s troubou a pračkou. Při pečení nabídnout dočasné vypnutí bojleru."

    pergola_boiler:
      label: "bojler na pergole"
      phase: "L2"
      type: "controlled_load"
      can_be_paused: true
      note: "Sdílí L2 s jednou polovinou varné desky."

    oven:
      label: "trouba"
      phase: "L3"
      type: "manual_load"
      conflicts_with:
        - "bottom_boiler"
      advice_when_conflict: "Jestli chceš péct, můžu na tu dobu vypnout spodní bojler, protože trouba je s ním na stejné fázi."

    hob:
      label: "varná deska"
      phases:
        - "L1"
        - "L2"
      phase_distribution:
        L1: "jedna polovina desky"
        L2: "druhá polovina desky"
      type: "manual_load"
      conflicts_with:
        - "dishwasher"
        - "pergola_boiler"
      note: "Deska je rozdělená napůl mezi L1 a L2. Zátěž závisí na tom, která polovina a kolik plotýnek právě běží."

    washing_machine:
      label: "pračka"
      phase: "L3"
      type: "manual_load"
      conflicts_with:
        - "bottom_boiler"
        - "oven"
      preferred_when:
        - "battery_above_target"
        - "solar_surplus_available"
      note: "Pračka je na L3. Když běží spodní bojler nebo trouba, poradce má upozornit na souběh na stejné fázi."

    dishwasher:
      label: "myčka"
      phase: "L1"
      type: "manual_load"
      conflicts_with:
        - "hob_l1_half"
      preferred_when:
        - "battery_above_target"
        - "solar_surplus_available"
      note: "Myčka je na L1. Při silném vaření na L1 polovině desky upozornit na souběh."

  advice_rules:
    - id: "surplus_household_loads_ok"
      when: "battery_soc >= target_soc and solar_surplus_available"
      say: "Je dobrá chvíle pustit běžné domácí zátěže, ale zohledni jejich fázi a právě běžící spotřebiče."

    - id: "oven_conflicts_with_bottom_boiler"
      when: "bottom_boiler_on and user_may_want_oven"
      say: "Trouba je na stejné fázi L3 jako spodní bojler. Nabídni dočasné vypnutí bojleru, ale nic nevypínej bez potvrzení."

    - id: "washing_machine_conflicts_with_bottom_boiler"
      when: "bottom_boiler_on and user_may_want_washing_machine"
      say: "Pračka je také na L3. Upozorni na souběh se spodním bojlerem; automaticky nic nevypínej."

    - id: "dishwasher_conflicts_with_hob_l1"
      when: "dishwasher_on and hob_l1_half_heavily_loaded"
      say: "Myčka i jedna polovina varné desky jsou na L1. Při větším vaření na této polovině upozorni na souběh."

    - id: "pergola_boiler_conflicts_with_hob_l2"
      when: "pergola_boiler_on and hob_l2_half_heavily_loaded"
      say: "Bojler na pergole a druhá polovina varné desky jsou na L2. Při větším vaření na této polovině upozorni na souběh."

    - id: "hob_is_split_between_l1_l2"
      when: "user_may_want_hob"
      say: "Varná deska není jedna společná zátěž: jedna polovina je na L1 a druhá na L2. Radu odvozuj podle zatížení konkrétní fáze, ne pouze podle toho, že je deska zapnutá."
