template:
  - sensor:
      - name: EMS Bottom Boiler Top Temp
        unique_id: ems_bottom_boiler_top_temp
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        state: "{{ states('sensor.rele_16ch_tech_bojler_hl_horn') | float(0) }}"

      - name: EMS Bottom Boiler Bottom Temp
        unique_id: ems_bottom_boiler_bottom_temp
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        state: "{{ states('sensor.rele_16ch_tech_bojler_hl_doln') | float(0) }}"

      - name: EMS Pergola Boiler Temp
        unique_id: ems_pergola_boiler_temp
        unit_of_measurement: °C
        device_class: temperature
        state_class: measurement
        state: "{{ states('sensor.bojler_pergola_bojler_pergola_teplota') | float(0) }}"

      - name: EMS Battery SOC
        unique_id: ems_battery_soc
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: "{{ states('sensor.bat_soc_ave') | float(0) }}"

      - name: EMS Battery Power
        unique_id: ems_battery_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.battery_power_total') | float(0) }}"

      - name: EMS Battery Voltage
        unique_id: ems_battery_voltage
        unit_of_measurement: V
        device_class: voltage
        state_class: measurement
        state: >
          {% set v1 = states('sensor.jk_bms_total_voltage') | float(0) %}
          {% set v2 = states('sensor.jk_bms_jk_bms_1_total_voltage') | float(0) %}
          {% set v3 = states('sensor.easun_l2_easun_l2_battery_average_voltage') | float(0) %}
          {% set vals = [v1, v2] | select('gt', 0) | list %}
          {{ (vals | min if vals | count > 0 else v3) | round(2) }}

      - name: EMS Battery Voltage Source
        unique_id: ems_battery_voltage_source
        icon: mdi:sine-wave
        state: >
          {% set v1 = states('sensor.jk_bms_total_voltage') | float(0) %}
          {% set v2 = states('sensor.jk_bms_jk_bms_1_total_voltage') | float(0) %}
          {% if v1 > 0 and v2 > 0 %}
            min_jk_bms
          {% elif v1 > 0 %}
            jk_bms_total_voltage
          {% elif v2 > 0 %}
            jk_bms_1_total_voltage
          {% else %}
            easun_l2_average_voltage
          {% endif %}

      - name: EMS PV Power
        unique_id: ems_pv_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.vykon_solary') | float(0) }}"

      - name: EMS Inverter L1 Power
        unique_id: ems_inverter_l1_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.easun_l1_easun_l1_output_active_power') | float(0) }}"

      - name: EMS Inverter L2 Power
        unique_id: ems_inverter_l2_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.easun_l2_easun_l2_output_active_power') | float(0) }}"

      - name: EMS Inverter L3 Power
        unique_id: ems_inverter_l3_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.easun_l3_easun_l3_output_active_power') | float(0) }}"

      - name: EMS Grid L1 Power
        unique_id: ems_grid_l1_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.power_meter_vstup_power_a') | float(0) }}"

      - name: EMS Grid L2 Power
        unique_id: ems_grid_l2_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.power_meter_vstup_power_b') | float(0) }}"

      - name: EMS Grid L3 Power
        unique_id: ems_grid_l3_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: "{{ states('sensor.power_meter_vstup_power_c') | float(0) }}"

      - name: EMS Surplus Power
        unique_id: ems_surplus_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set p = states('sensor.ems_battery_power') | float(0) %}
          {{ [p, 0] | max | round(0) }}

      - name: EMS Deficit Power
        unique_id: ems_deficit_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set p = states('sensor.ems_battery_power') | float(0) %}
          {{ [0 - p, 0] | max | round(0) }}

      - name: EMS Available L1
        unique_id: ems_available_l1
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set limit = states('input_number.ems_inverter_phase_limit_w') | float(6200) %}
          {% set load = states('sensor.ems_inverter_l1_power') | float(0) %}
          {{ [limit - load, 0] | max | round(0) }}

      - name: EMS Available L2
        unique_id: ems_available_l2
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set limit = states('input_number.ems_inverter_phase_limit_w') | float(6200) %}
          {% set load = states('sensor.ems_inverter_l2_power') | float(0) %}
          {{ [limit - load, 0] | max | round(0) }}

      - name: EMS Available L3
        unique_id: ems_available_l3
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set limit = states('input_number.ems_inverter_phase_limit_w') | float(6200) %}
          {% set load = states('sensor.ems_inverter_l3_power') | float(0) %}
          {{ [limit - load, 0] | max | round(0) }}

      - name: EMS House Load Total
        unique_id: ems_house_load_total
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.ems_inverter_l1_power') | float(0) + states('sensor.ems_inverter_l2_power') | float(0) + states('sensor.ems_inverter_l3_power') | float(0)) | round(0) }}

      - name: EMS Grid Power Total
        unique_id: ems_grid_power_total
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.ems_grid_l1_power') | float(0) + states('sensor.ems_grid_l2_power') | float(0) + states('sensor.ems_grid_l3_power') | float(0)) | round(0) }}

      - name: EMS Forecast Tomorrow
        unique_id: ems_forecast_tomorrow
        unit_of_measurement: kWh
        icon: mdi:weather-sunny
        state: "{{ states('sensor.solcast_pv_forecast_forecast_tomorrow') | float(0) }}"

      - name: EMS Forecast Remaining Today
        unique_id: ems_forecast_remaining_today
        unit_of_measurement: kWh
        icon: mdi:weather-sunny-alert
        state: "{{ states('sensor.solcast_pv_forecast_forecast_remaining_today') | float(0) }}"

      - name: EMS Forecast Day Type Tomorrow
        unique_id: ems_forecast_day_type_tomorrow
        icon: mdi:weather-partly-cloudy
        state: >
          {% set f = states('sensor.ems_forecast_tomorrow') | float(0) %}
          {% set bad = states('input_number.ems_forecast_bad_threshold_kwh') | float(20) %}
          {% set sunny = states('input_number.ems_forecast_sunny_threshold_kwh') | float(30) %}
          {% if f < bad %}bad{% elif f >= sunny %}sunny{% else %}normal{% endif %}

      - name: EMS Battery Target SOC
        unique_id: ems_battery_target_soc
        unit_of_measurement: "%"
        icon: mdi:battery-sync
        state: >
          {% set day = states('sensor.ems_forecast_day_type_tomorrow') %}
          {% if day == 'sunny' %}
            {{ states('input_number.ems_battery_target_sunny_soc') | float(60) }}
          {% elif day == 'bad' %}
            {{ states('input_number.ems_battery_target_bad_soc') | float(90) }}
          {% else %}
            {{ states('input_number.ems_battery_target_normal_soc') | float(75) }}
          {% endif %}

      - name: EMS Battery Effective Minimum SOC
        unique_id: ems_battery_effective_minimum_soc
        unit_of_measurement: "%"
        icon: mdi:battery-lock
        state: >
          {% set hard = states('input_number.ems_battery_hard_min_soc') | float(40) %}
          {% set target = states('sensor.ems_battery_target_soc') | float(75) %}
          {{ [target - 10, hard] | max | round(0) }}

      - name: EMS Dynamic Tariff Discount
        unique_id: ems_dynamic_tariff_discount
        unit_of_measurement: "%"
        icon: mdi:cash-clock
        state: >
          {% set hdo = states('sensor.tman_parc_c_44_17_267_21_tman_stav_hdo') %}
          {% if hdo == 'NT' %}
            -10
          {% else %}
            10
          {% endif %}

      - name: EMS Dynamic Tariff Class
        unique_id: ems_dynamic_tariff_class
        icon: mdi:cash-fast
        state: >
          {% set hdo = states('sensor.tman_parc_c_44_17_267_21_tman_stav_hdo') %}
          {% if hdo == 'NT' %}
            cheap
          {% else %}
            expensive
          {% endif %}


      - name: EMS High SOC Loads Allowed
        unique_id: ems_high_soc_loads_allowed
        icon: mdi:battery-arrow-up
        state: >
          {% set soc = states('sensor.ems_battery_soc') | float(0) %}
          {% set threshold = states('input_number.ems_high_soc_load_threshold') | float(90) %}
          {{ soc >= threshold and not is_state('binary_sensor.ems_battery_load_locked', 'on') }}

      - name: EMS Full SOC Load Probe
        unique_id: ems_full_soc_load_probe
        icon: mdi:battery-charging-high
        state: >
          {% set soc = states('sensor.ems_battery_soc') | float(0) %}
          {% set threshold = states('input_number.ems_full_soc_load_threshold') | float(95) %}
          {{ soc >= threshold and not is_state('binary_sensor.ems_battery_load_locked', 'on') }}

  - binary_sensor:
      - name: EMS Cheap Grid Usable
        unique_id: ems_cheap_grid_usable
        icon: mdi:cash-clock
        state: >
          {{ is_state('sensor.tman_parc_c_44_17_267_21_tman_stav_hdo', 'NT') }}

      - name: EMS Very Cheap Grid Usable
        unique_id: ems_very_cheap_grid_usable
        icon: mdi:cash-plus
        state: >
          {{ false }}

      - name: EMS ID3 Wallbox Connected
        unique_id: ems_id3_wallbox_connected
        icon: mdi:ev-plug-type2
        state: >
          {{ states('select.tuya_wallbox_2_wallbox_state') in ['Plugged', 'Waiting', 'Ready', 'Charging'] }}

      - name: EMS ID4 Wallbox Connected
        unique_id: ems_id4_wallbox_connected
        icon: mdi:ev-plug-type2
        state: >
          {{ states('select.tuya_wallbox_1_wallbox_state') in ['Plugged', 'Waiting', 'Ready', 'Charging'] }}

      - name: EMS Any Car Connected
        unique_id: ems_any_car_connected
        icon: mdi:car-electric
        state: >
          {{ is_state('binary_sensor.ems_id3_wallbox_connected', 'on') or is_state('binary_sensor.ems_id4_wallbox_connected', 'on') }}

      - name: EMS Wood Boiler Heating Bottom Boiler
        unique_id: ems_wood_boiler_heating_bottom_boiler
        icon: mdi:fire
        state: "{{ is_state('input_boolean.ems_wood_boiler_heating_bottom_boiler', 'on') }}"

script:
  ems_notify_david:
    alias: EMS Notifikace jen David
    mode: parallel
    fields:
      title:
        required: true
      message:
        required: true
      channel:
        required: false
      importance:
        required: false
      ttl:
        required: false
    sequence:
      - service: notify.mobile_app_sm_s928b
        data:
          title: "{{ title }}"
          message: "{{ message }}"
          data:
            channel: "{{ channel | default('general') }}"
            importance: "{{ importance | default('high') }}"
            ttl: "{{ ttl | default(0) }}"
            priority: high
            sticky: true

  ems_ask_bottom_boiler_wood:
    alias: EMS dotaz spodní bojler dřevo
    icon: mdi:fire-alert
    mode: single
    sequence:
      - service: notify.mobile_app_sm_s928b
        data:
          title: "EMS: spodní bojler je studený"
          message: "Budeš dnes topit dřevem, nebo mám použít elektřinu podle přebytků?"
          data:
            channel: critical_alerts
            importance: high
            ttl: 0
            priority: high
            sticky: true
            tag: ems_bottom_boiler_wood_plan
            actions:
              - action: EMS_WOOD_WILL_HEAT
                title: Budu topit dřevem
              - action: EMS_WOOD_WILL_NOT_HEAT
                title: Nebudu topit
              - action: EMS_WOOD_MINIMUM_ONLY
                title: Jen minimum elektřinou

  ems_ask_wallbox_priority:
    alias: EMS dotaz priorita auta
    icon: mdi:car-clock
    mode: single
    sequence:
      - service: notify.mobile_app_sm_s928b
        data:
          title: "EMS: priorita nabíjení auta"
          message: "Jsou připojená obě auta a není dost výkonu pro obě. Které má mít prioritu?"
          data:
            channel: critical_alerts
            importance: high
            ttl: 0
            priority: high
            sticky: true
            tag: ems_wallbox_priority
            actions:
              - action: EMS_WALLBOX_PRIORITY_ID3
                title: Priorita ID.3
              - action: EMS_WALLBOX_PRIORITY_ID4
                title: Priorita ID.4
              - action: EMS_WALLBOX_PRIORITY_AUTO
                title: Automaticky

  ems_all_loads_off:
    alias: EMS vypnout všechny zátěže
    icon: mdi:power-plug-off
    mode: single
    sequence:
      - service: switch.turn_off
        target:
          entity_id:
            - switch.tuya_wallbox_1_wallbox_charge_enable
            - switch.tuya_wallbox_2_wallbox_charge_enable
            - switch.rele_16ch_tech_pin_2_2
            - switch.rele_16ch_tech_pin_9_2
            - switch.bojler_pergola_1
            - switch.bojler_pergola_2

  ems_wallboxes_minimum_power:
    alias: EMS wallboxy minimální proud
    icon: mdi:ev-plug-type2
    mode: single
    sequence:
      - service: number.set_value
        target:
          entity_id:
            - number.tuya_wallbox_1_wallbox_current_limit
            - number.tuya_wallbox_2_wallbox_current_limit
        data:
          value: "{{ states('input_number.ems_wallbox_min_current_a') | float(6) }}"

  ems_wallboxes_disable:
    alias: EMS wallboxy vypnout
    icon: mdi:ev-station-off
    mode: single
    sequence:
      - service: switch.turn_off
        target:
          entity_id:
            - switch.tuya_wallbox_1_wallbox_charge_enable
            - switch.tuya_wallbox_2_wallbox_charge_enable

  ems_wallboxes_switch_to_solar:
    alias: EMS wallboxy přepnout na FV
    icon: mdi:solar-power
    mode: single
    sequence:
      - service: script.ems_wallboxes_minimum_power
      - service: script.ems_wallboxes_disable
      - delay:
          seconds: 5
      - service: switch.turn_off
        target:
          entity_id: switch.wallbox_ts
      - delay:
          seconds: 5

  ems_wallboxes_switch_to_grid:
    alias: EMS wallboxy přepnout na síť
    icon: mdi:transmission-tower-import
    mode: single
    sequence:
      - service: script.ems_wallboxes_minimum_power
      - service: script.ems_wallboxes_disable
      - delay:
          seconds: 5
      - service: switch.turn_on
        target:
          entity_id: switch.wallbox_ts
      - delay:
          seconds: 5
          
  ems_wallboxes_apply_enable:
      alias: EMS wallboxy aplikovat zapnutí
      icon: mdi:ev-station
      mode: single
      fields:
        source:
          required: true
        id3_enable:
          required: true
        id4_enable:
          required: true
      sequence:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ source == 'GRID' }}"
              sequence:
                - service: script.ems_wallboxes_switch_to_grid
          default:
            - service: script.ems_wallboxes_switch_to_solar
    
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ id3_enable | bool and is_state('switch.tuya_wallbox_2_wallbox_charge_enable', 'off') }}"
              sequence:
                - service: switch.turn_on
                  target:
                    entity_id: switch.tuya_wallbox_2_wallbox_charge_enable
            - conditions:
                - condition: template
                  value_template: "{{ not (id3_enable | bool) and is_state('switch.tuya_wallbox_2_wallbox_charge_enable', 'on') }}"
              sequence:
                - service: switch.turn_off
                  target:
                    entity_id: switch.tuya_wallbox_2_wallbox_charge_enable
    
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ id4_enable | bool and is_state('switch.tuya_wallbox_1_wallbox_charge_enable', 'off') }}"
              sequence:
                - service: switch.turn_on
                  target:
                    entity_id: switch.tuya_wallbox_1_wallbox_charge_enable
            - conditions:
                - condition: template
                  value_template: "{{ not (id4_enable | bool) and is_state('switch.tuya_wallbox_1_wallbox_charge_enable', 'on') }}"
              sequence:
                - service: switch.turn_off
                  target:
                    entity_id: switch.tuya_wallbox_1_wallbox_charge_enable
                    
  ems_wallboxes_apply_current:
      alias: EMS wallboxy nastavit proud
      icon: mdi:current-ac
      mode: single
      fields:
        id3_current:
          required: false
        id4_current:
          required: false
      sequence:
        - service: number.set_value
          target:
            entity_id: number.tuya_wallbox_2_wallbox_current_limit
          data:
            value: "{{ id3_current | default(states('input_number.ems_wallbox_min_current_a')) | float(6) }}"
    
        - service: number.set_value
          target:
            entity_id: number.tuya_wallbox_1_wallbox_current_limit
          data:
            value: "{{ id4_current | default(states('input_number.ems_wallbox_min_current_a')) | float(6) }}"

  ems_wallboxes_apply_decision:
    alias: EMS wallboxy aplikovat rozhodnutí
    icon: mdi:ev-station
    mode: single
    fields:
      source:
        required: true
      id3_enable:
        required: true
      id4_enable:
        required: true
      id3_current:
        required: false
      id4_current:
        required: false
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ source == 'GRID' }}"
            sequence:
              - service: script.ems_wallboxes_switch_to_grid
        default:
          - service: script.ems_wallboxes_switch_to_solar

      # ID3 je fyzicky wallbox 2
      - service: number.set_value
        target:
          entity_id: number.tuya_wallbox_2_wallbox_current_limit
        data:
          value: "{{ id3_current | default(states('input_number.ems_wallbox_min_current_a')) | float(6) }}"

      # ID4 je fyzicky wallbox 1
      - service: number.set_value
        target:
          entity_id: number.tuya_wallbox_1_wallbox_current_limit
        data:
          value: "{{ id4_current | default(states('input_number.ems_wallbox_min_current_a')) | float(6) }}"

      - delay:
          seconds: 2

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ id3_enable | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.tuya_wallbox_2_wallbox_charge_enable
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.tuya_wallbox_2_wallbox_charge_enable

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ id4_enable | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.tuya_wallbox_1_wallbox_charge_enable
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.tuya_wallbox_1_wallbox_charge_enable

  ems_inverters_ac_in_on:
    alias: EMS měniče připnout síť
    icon: mdi:transmission-tower-import
    mode: single
    sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.sit_menice

  ems_inverters_ac_in_off:
    alias: EMS měniče odpojit síť
    icon: mdi:transmission-tower-off
    mode: single
    sequence:
      - service: switch.turn_off
        target:
          entity_id: switch.sit_menice

  ems_inverters_emergency_grid_charge_on:
    alias: EMS nouzové nabíjení baterie zapnout
    icon: mdi:battery-alert
    mode: single
    fields:
      current_a:
        description: Nouzový nabíjecí proud
        example: 10
    sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.sit_menice
      - delay:
          seconds: 2
      - service: select.select_option
        target:
          entity_id: select.easun_l1_easun_l1_battery_charging_priority
        data:
          option: "PV is at the same level as the Utility"
      - service: number.set_value
        target:
          entity_id: number.easun_l1_easun_l1_maximum_mains_charging_current
        data:
          value: "{{ current_a | default(states('input_number.ems_emergency_charge_current_a')) | float(10) }}"

  ems_inverters_emergency_grid_charge_off:
    alias: EMS nouzové nabíjení baterie vypnout
    icon: mdi:battery-check
    mode: single
    sequence:
      - service: select.select_option
        target:
          entity_id: select.easun_l1_easun_l1_battery_charging_priority
        data:
          option: "Only PV charging is allowed"

  ems_inverters_start_grid_charge:
    alias: EMS měniče start dobíjení ze sítě
    icon: mdi:battery-charging
    mode: single
    fields:
      current_a:
        description: Proud dobíjení baterie ze sítě
        example: 10
    sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.sit_menice
      - delay:
          seconds: 2
      - service: select.select_option
        target:
          entity_id: select.easun_l1_easun_l1_output_priority
        data:
          option: "Utility-PV-Battery (UTI)"
      - service: select.select_option
        target:
          entity_id: select.easun_l1_easun_l1_battery_charging_priority
        data:
          option: "Utility priority"
      - service: number.set_value
        target:
          entity_id: number.easun_l1_easun_l1_maximum_mains_charging_current
        data:
          value: "{{ current_a | default(states('input_number.ems_inverter_grid_charge_current_a')) | float(10) }}"
      - delay:
          seconds: 2

  ems_inverters_stop_grid_charge:
    alias: EMS měniče stop dobíjení ze sítě
    icon: mdi:solar-power
    mode: single
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.ems_battery_voltage') | float(0) >= states('input_number.ems_emergency_charge_recover_above_v') | float(49.2)
                     and is_state('binary_sensor.ems_emergency_charge_active', 'off') }}
            sequence:
              - service: select.select_option
                target:
                  entity_id: select.easun_l1_easun_l1_battery_charging_priority
                data:
                  option: "Only PV charging is allowed"
      - service: select.select_option
        target:
          entity_id: select.easun_l1_easun_l1_output_priority
        data:
          option: "PV-Battery-Utility (SBU)"
      - delay:
          seconds: 2
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.ems_battery_voltage') | float(0) >= states('input_number.ems_ac_in_disconnect_above_v') | float(52.8)
                     and is_state('binary_sensor.ems_emergency_charge_active', 'off') }}
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: switch.sit_menice


  ems_boilers_apply_decision:
    alias: EMS bojlery aplikovat rozhodnutí
    icon: mdi:water-boiler
    mode: single
    fields:
      bottom_t1:
        required: true
      bottom_t2:
        required: true
      pergola_t1:
        required: true
      pergola_t2:
        required: true
    sequence:
      # spodní bojler T1
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ bottom_t1 | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.rele_16ch_tech_pin_2_2
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.rele_16ch_tech_pin_2_2

      # spodní bojler T2
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ bottom_t2 | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.rele_16ch_tech_pin_9_2
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.rele_16ch_tech_pin_9_2

      # pergola bojler T1
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pergola_t1 | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.bojler_pergola_1
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.bojler_pergola_1

      # pergola bojler T2
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pergola_t2 | bool }}"
            sequence:
              - service: switch.turn_on
                target:
                  entity_id: switch.bojler_pergola_2
        default:
          - service: switch.turn_off
            target:
              entity_id: switch.bojler_pergola_2

automation:
  - alias: EMS odpověď na dotaz spodní bojler dřevo
    id: ems_bottom_boiler_wood_plan_action
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: >
          {{ trigger.event.data.action in ['EMS_WOOD_WILL_HEAT', 'EMS_WOOD_WILL_NOT_HEAT', 'EMS_WOOD_MINIMUM_ONLY'] }}
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.ems_bottom_boiler_wood_plan
        data:
          option: >
            {% if trigger.event.data.action == 'EMS_WOOD_WILL_HEAT' %}will_heat
            {% elif trigger.event.data.action == 'EMS_WOOD_WILL_NOT_HEAT' %}will_not_heat
            {% else %}minimum_only{% endif %}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.action == 'EMS_WOOD_WILL_HEAT' }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ems_wood_boiler_heating_bottom_boiler
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ems_wood_boiler_heating_bottom_boiler

      - service: script.ems_notify_david
        data:
          title: "EMS: odpověď uložena"
          message: "Plán spodního bojleru: {{ states('input_select.ems_bottom_boiler_wood_plan') }}"
          channel: general
          importance: high
          ttl: 0

  - alias: EMS odpověď na dotaz priorita auta
    id: ems_wallbox_priority_action
    mode: single
    trigger:
      - platform: event
        event_type: mobile_app_notification_action
    condition:
      - condition: template
        value_template: >
          {{ trigger.event.data.action in ['EMS_WALLBOX_PRIORITY_ID3', 'EMS_WALLBOX_PRIORITY_ID4', 'EMS_WALLBOX_PRIORITY_AUTO'] }}
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.ems_wallbox_priority
        data:
          option: >
            {% if trigger.event.data.action == 'EMS_WALLBOX_PRIORITY_ID3' %}ID3
            {% elif trigger.event.data.action == 'EMS_WALLBOX_PRIORITY_ID4' %}ID4
            {% else %}AUTO{% endif %}

      - service: script.ems_notify_david
        data:
          title: "EMS: priorita auta uložena"
          message: "Priorita nabíjení auta: {{ states('input_select.ems_wallbox_priority') }}"
          channel: general
          importance: high
          ttl: 0

group:
  ems:
    name: EMS
    entities:
      - input_boolean.ems_enabled
      - input_select.ems_wallbox_mode
      - input_select.ems_wallbox_priority
      - input_select.ems_battery_grid_mode
      - input_select.ems_boiler_mode
      - input_boolean.ems_wood_boiler_heating_bottom_boiler
      - input_boolean.ems_winter_mode
      - input_boolean.ems_allow_grid_charge
      - input_boolean.ems_allow_solar_loads
      - sensor.ems_battery_soc
      - sensor.ems_battery_power
      - sensor.ems_pv_power
      - sensor.ems_surplus_power
      - sensor.ems_deficit_power
