mqtt:
  sensor:
    - name: EMS Grid Purchase Summary
      unique_id: ems_grid_purchase_summary
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.grid_purchase.summary | default('Bez plánu nákupu') }}"
      icon: mdi:calendar-clock

    - name: EMS Grid Purchase Status
      unique_id: ems_grid_purchase_status
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.grid_purchase.status | default('none') }}"
      icon: mdi:calendar-check

    - name: EMS Grid Purchase Needed kWh
      unique_id: ems_grid_purchase_needed_kwh
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.grid_purchase.needed_kwh | default(0) }}"
      unit_of_measurement: "kWh"
      icon: mdi:transmission-tower-import

    - name: EMS Grid Purchase Planned kWh
      unique_id: ems_grid_purchase_planned_kwh
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.grid_purchase.planned_kwh | default(0) }}"
      unit_of_measurement: "kWh"
      icon: mdi:cash-clock
    - name: EMS ID3 Required kWh
      unique_id: ems_id3_required_kwh
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.cars.id3.required_kwh | default(0) }}"
      unit_of_measurement: "kWh"
      icon: mdi:car-electric

    - name: EMS ID4 Required kWh
      unique_id: ems_id4_required_kwh
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.cars.id4.required_kwh | default(0) }}"
      unit_of_measurement: "kWh"
      icon: mdi:car-electric

    - name: EMS Battery Missing kWh
      unique_id: ems_battery_missing_kwh
      state_topic: ems/decision/state
      value_template: "{{ value_json.plan.battery.missing_kwh | default(0) }}"
      unit_of_measurement: "kWh"
      icon: mdi:battery-plus
      
    - name: EMS Mode
      unique_id: ems_mode
      state_topic: ems/decision/state
      value_template: "{{ value_json.mode | default('UNKNOWN') }}"
      icon: mdi:state-machine

    - name: EMS Decision Reason
      unique_id: ems_decision_reason
      state_topic: ems/decision/state
      value_template: "{{ value_json.reason | default('unknown') }}"
      icon: mdi:brain

    - name: EMS Decision Trace
      unique_id: ems_decision_trace
      state_topic: ems/decision/state
      value_template: >
        {% for item in value_json.trace | default([]) %}
          {{ item.step }}={{ item.state }}{% if not loop.last %} | {% endif %}
        {% endfor %}
      icon: mdi:source-branch


    - name: EMS Decision Trace Detailed
      unique_id: ems_decision_trace_detailed
      state_topic: ems/decision/trace
      value_template: "{{ value_json.boiler.selected | default(value_json.selected | default('IDLE')) }}"
      json_attributes_topic: ems/decision/trace
      icon: mdi:source-branch-check

    - name: EMS High SOC Load State
      unique_id: ems_high_soc_load_state
      state_topic: ems/decision/trace
      value_template: >-
        {% if value_json.inputs.high_soc_loads_allowed | default(false) %}
          allowed
        {% else %}
          blocked
        {% endif %}
      json_attributes_topic: ems/decision/trace
      icon: mdi:battery-arrow-up-outline

    - name: EMS Wallbox Reason
      unique_id: ems_wallbox_reason
      state_topic: ems/decision/state
      value_template: "{{ value_json.wallbox.reason | default('unknown') }}"
      icon: mdi:ev-station

    - name: EMS Wallbox Source
      unique_id: ems_wallbox_source
      state_topic: ems/decision/state
      value_template: "{{ value_json.wallbox.source | default('SOLAR') }}"
      icon: mdi:transmission-tower-import

    - name: EMS Wallbox Current
      unique_id: ems_wallbox_current
      state_topic: ems/decision/state
      value_template: "{{ value_json.wallbox.current_a | default(0) }}"
      unit_of_measurement: A
      icon: mdi:current-ac

    - name: EMS Battery Charge Reason
      unique_id: ems_battery_charge_reason
      state_topic: ems/decision/state
      value_template: "{{ value_json.battery_grid_charge.reason | default('unknown') }}"
      icon: mdi:battery-clock

    - name: EMS Battery Charge Current
      unique_id: ems_battery_charge_current
      state_topic: ems/decision/state
      value_template: "{{ value_json.battery_grid_charge.current_a | default(0) }}"
      unit_of_measurement: A
      icon: mdi:current-ac

    - name: EMS Dispatcher Last Action
      unique_id: ems_dispatcher_last_action
      state_topic: ems/decision/state
      value_template: "{{ value_json.dispatcher.last_action | default('unknown') }}"
      icon: mdi:play-circle

    - name: EMS Dispatcher Last Change
      unique_id: ems_dispatcher_last_change
      state_topic: ems/decision/state
      value_template: "{{ value_json.dispatcher.last_change | default(0) }}"
      icon: mdi:clock-outline


    - name: EMS AC-in Status
      unique_id: ems_ac_in_status
      state_topic: ems/safety
      value_template: "{{ value_json.ac_in.status_display | default(value_json.ac_in.status | default('neznámý')) }}"
      icon: mdi:electric-switch

    - name: EMS AC-in Reason
      unique_id: ems_ac_in_reason
      state_topic: ems/safety
      value_template: "{{ value_json.ac_in.reason_display | default(value_json.ac_in.reason | default('neznámý')) }}"
