input_select:
  ems_wallbox_mode:
    name: EMS wallbox režim
    icon: mdi:ev-station
    options:
      - AUTO
      - SOLAR
      - GRID
      - 'OFF'
    initial: AUTO

  ems_wallbox_priority:
    name: EMS priorita auta
    icon: mdi:car-clock
    options:
      - AUTO
      - ID3
      - ID4
    initial: AUTO

  ems_battery_grid_mode:
    name: EMS dobíjení baterie ze sítě
    icon: mdi:battery-charging
    options:
      - AUTO
      - FORCE
      - 'OFF'
    initial: AUTO

  ems_ac_in_mode:
    name: EMS AC-in režim měničů
    icon: mdi:electric-switch
    options: ['AUTO', 'FORCE_ON', 'FORCE_OFF']
    initial: 'AUTO'

  ems_boiler_mode:
    name: EMS bojlery režim
    icon: mdi:water-boiler
