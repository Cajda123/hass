    icon: mdi:snowflake

  ems_allow_grid_charge:
    name: EMS povolit dobíjení ze sítě
    icon: mdi:transmission-tower-import

  ems_allow_solar_loads:
    name: EMS povolit FV zátěže
    icon: mdi:solar-power
  ems_live_wallbox:
    name: EMS Live Wallbox

  ems_live_battery_grid:
    name: EMS Live Battery Grid

  ems_live_boiler:
    name: EMS Live Boiler
    
  ems_live_notifications:
    name: EMS Live Notifications
    icon: mdi:bell

  ems_wood_boiler_heating_bottom_boiler:
    name: EMS dřevo blokuje spodní bojler
    icon: mdi:fire

  ems_id3_use_departure_time:
    name: EMS ID.3 používat čas odjezdu
    icon: mdi:clock-start

  ems_id4_use_departure_time:
    name: EMS ID.4 používat čas odjezdu
